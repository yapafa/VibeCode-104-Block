<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <title>104 職缺黑名單管理介面</title>
        <style>
            body {
                width: 320px;
                padding: 15px;
                font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
                background-color: #f9f9f9;
            }
            h3 {
                margin-top: 0;
                margin-bottom: 12px;
                font-size: 18px;
                color: #333;
                border-bottom: 2px solid #ff6000;
                padding-bottom: 5px;
            }
            #filter-input {
                width: 100%;
                padding: 8px;
                margin-bottom: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box;
                font-size: 14px;
            }
            #list-container {
                width: 100%;
                height: 250px;
                overflow-y: auto;
                background: white;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box;
            }
            .list-item:hover {
                background-color: #fff7f2;
            }
            button {
                width: 100%;
                padding: 10px;
                cursor: pointer;
                border: none;
                border-radius: 4px;
                font-weight: bold;
                font-size: 15px;
                transition: background 0.3s;
                margin-top: 10px;
            }
            #delete-selected {
                background: #666;
                color: white;
            }
            #delete-selected:hover {
                background: #444;
            }
            #save {
                background: #ff6000;
                color: white;
            }
            #save:hover {
                background: #e65600;
            }
            /* 維護區按鈕樣式 */
            .maintenance-zone {
                display: flex;
                gap: 5px;
                margin-top: 10px;
                border-top: 1px dashed #ccc;
                padding-top: 10px;
            }
            .maintenance-zone button {
                margin-top: 0;
                font-size: 12px;
                padding: 8px;
            }
            #export-btn {
                background: #28a745;
                color: white;
            }
            #import-btn {
                background: #17a2b8;
                color: white;
            }
        </style>
    </head>
    <body>
        <h3>104 職缺黑名單 V1.1</h3>

        <input
            type="text"
            id="filter-input"
            placeholder="🔍 搜尋已封鎖的公司..."
        />

        <div id="list-container"></div>

        <button id="delete-selected">移除所選項目</button>
        <button id="save">儲存變更並重整頁面</button>

        <div class="maintenance-zone">
            <button id="export-btn">匯出備份</button>
            <button id="import-btn">匯入名單</button>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
