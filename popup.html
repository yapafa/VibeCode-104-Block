<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <title>104 職缺黑名單管理介面</title>
        <style>
            /* 設定彈出視窗的全域樣式 */
            body {
                width: 300px;
                padding: 15px; /* 增加邊距以提升視覺舒適度 */
                font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
                background-color: #f9f9f9; /* 淺灰色背景減少視覺負擔 */
            }

            /* 標題樣式 */
            h3 {
                margin-top: 0;
                margin-bottom: 12px;
                font-size: 18px;
                color: #333;
                border-bottom: 2px solid #ff6000; /* 加入 104 代表色的底線裝飾 */
                padding-bottom: 5px;
            }

            /* 文字輸入區樣式 */
            textarea {
                width: 100%;
                height: 250px; /* 增加高度以便於檢視較長的黑名單 */
                font-size: 14px;
                padding: 8px;
                border: 1px solid #ddd;
                border-radius: 4px;
                box-sizing: border-box; /* 確保 padding 不影響總寬度 */
                resize: none; /* 禁用手動調整大小以維持 Popup 比例 */
            }

            /* 儲存按鈕樣式 */
            button {
                margin-top: 15px;
                width: 100%;
                padding: 10px;
                cursor: pointer;
                background: #ff6000; /* 使用 104 官方品牌橘色系 */
                color: white;
                border: none;
                border-radius: 4px;
                font-weight: bold;
                font-size: 15px;
                transition: background 0.3s; /* 加入點擊後的微小動態回饋 */
            }

            button:hover {
                background: #e65600; /* 滑鼠懸停時加深色調 */
            }

            button:active {
                background: #cc4d00; /* 點擊瞬間的深色反饋 */
            }
        </style>
    </head>
    <body>
        <h3>104 職缺黑名單</h3>

        <textarea
            id="list"
            placeholder="輸入範例：&#10;公司名稱一&#10;公司名稱二"
        ></textarea>

        <button id="save">儲存黑名單並重整</button>

        <script src="popup.js"></script>
    </body>
</html>
